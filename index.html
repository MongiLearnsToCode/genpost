<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloSpark AI Caption Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-deep-forest: #1A3C34;
      --color-warm-blush: #E8B4B8;
      --color-burnt-sienna: #D97706;
      --color-crisp-white: #FFFFFF;
      --color-charcoal-gray: #2D3748;
    }
    body {
      font-family: 'Lora', serif;
      background-color: var(--color-crisp-white);
      color: var(--color-charcoal-gray);
      line-height: 1.6; /* Generous line spacing for body text */
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Montserrat', sans-serif;
      line-height: 1.3; /* Line spacing for headings */
    }
    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1; /* Light gray track */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--color-charcoal-gray); /* Charcoal gray thumb */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555; /* Darker gray on hover */
    }
  </style>
